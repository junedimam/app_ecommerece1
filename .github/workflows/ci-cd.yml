name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER_NAME: flixstore-cluster

jobs:
  test:
    name: Test Services
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [auth-service, product-catalog, cart-service, payment-service]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install dependencies
      run: |
        cd services/${{ matrix.service }}
        npm install

    - name: Run lint
      run: |
        cd services/${{ matrix.service }}
        npx eslint . --ext .js || true

    - name: Run tests
      run: |
        cd services/${{ matrix.service }}
        npm test || echo "No tests configured"

  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-push:
    name: Build and Push Docker Images
    needs: [test, sonarcloud]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    continue-on-error: true

    strategy:
      matrix:
        service: [auth-service, product-catalog, cart-service, payment-service, frontend]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      continue-on-error: true
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      continue-on-error: true
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set build context
      id: context
      run: |
        if [ "${{ matrix.service }}" = "frontend" ]; then
          echo "path=./frontend" >> "$GITHUB_OUTPUT"
        else
          echo "path=./services/${{ matrix.service }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Build image
      env:
        ECR_REPOSITORY: flixstore-${{ matrix.service }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ${{ steps.context.outputs.path }}

    - name: Push image to Amazon ECR
      continue-on-error: true
      env:
        ECR_REPOSITORY: flixstore-${{ matrix.service }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy:
    name: Deploy to EKS
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    continue-on-error: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      continue-on-error: true
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      continue-on-error: true
      run: |
        aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

    - name: Deploy to Kubernetes
      continue-on-error: true
      run: |
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/

        # Update deployments with new image tags
        kubectl set image deployment/auth-service auth-service=$ECR_REGISTRY/flixstore-auth-service:${{ github.sha }} -n flixstore
        kubectl set image deployment/product-catalog product-catalog=$ECR_REGISTRY/flixstore-product-catalog:${{ github.sha }} -n flixstore
        kubectl set image deployment/cart-service cart-service=$ECR_REGISTRY/flixstore-cart-service:${{ github.sha }} -n flixstore
        kubectl set image deployment/payment-service payment-service=$ECR_REGISTRY/flixstore-payment-service:${{ github.sha }} -n flixstore
        kubectl set image deployment/frontend frontend=$ECR_REGISTRY/flixstore-frontend:${{ github.sha }} -n flixstore

        kubectl rollout status deployment/auth-service -n flixstore --timeout=180s
        kubectl rollout status deployment/product-catalog -n flixstore --timeout=180s
        kubectl rollout status deployment/cart-service -n flixstore --timeout=180s
        kubectl rollout status deployment/payment-service -n flixstore --timeout=180s
        kubectl rollout status deployment/frontend -n flixstore --timeout=180s

    - name: Verify deployment
      continue-on-error: true
      run: |
        kubectl get pods -n flixstore
        kubectl get services -n flixstore
        kubectl get ingress -n flixstore

    - name: Print public application URL
      continue-on-error: true
      run: |
        echo "Public URL (ingress-nginx LoadBalancer):"
        kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
