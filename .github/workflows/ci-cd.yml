name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER_NAME: flixstore-cluster

jobs:
  test:
    name: Test Services
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: [auth-service, product-catalog, cart-service, payment-service]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
    
    - name: Install dependencies
      run: |
        cd services/${{ matrix.service }}
        npm install
    
    - name: Run lint
      run: |
        cd services/${{ matrix.service }}
        npx eslint . --ext .js || true
    
    - name: Run tests
      run: |
        cd services/${{ matrix.service }}
        npm test || echo "No tests configured"

  build-and-push:
    name: Build and Push Docker Images
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    continue-on-error: true
    
    strategy:
      matrix:
        service: [auth-service, product-catalog, cart-service, payment-service]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      continue-on-error: true
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Login to Amazon ECR
      continue-on-error: true
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
    
    - name: Build, tag, and push image to Amazon ECR
      continue-on-error: true
      env:
        ECR_REPOSITORY: flixstore-${{ matrix.service }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./services/${{ matrix.service }}
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy:
    name: Deploy to EKS
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    continue-on-error: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      continue-on-error: true
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Update kubeconfig
      continue-on-error: true
      run: |
        aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME
    
    - name: Deploy to Kubernetes
      continue-on-error: true
      run: |
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/
        
        # Update deployments with new image tags
        kubectl set image deployment/auth-service auth-service=$ECR_REGISTRY/flixstore-auth-service:${{ github.sha }} -n flixstore
        kubectl set image deployment/product-catalog product-catalog=$ECR_REGISTRY/flixstore-product-catalog:${{ github.sha }} -n flixstore
        kubectl set image deployment/cart-service cart-service=$ECR_REGISTRY/flixstore-cart-service:${{ github.sha }} -n flixstore
        kubectl set image deployment/payment-service payment-service=$ECR_REGISTRY/flixstore-payment-service:${{ github.sha }} -n flixstore
        
        kubectl rollout status deployment/auth-service -n flixstore
        kubectl rollout status deployment/product-catalog -n flixstore
        kubectl rollout status deployment/cart-service -n flixstore
        kubectl rollout status deployment/payment-service -n flixstore
    
    - name: Verify deployment
      continue-on-error: true
      run: |
        kubectl get pods -n flixstore
        kubectl get services -n flixstore
        kubectl get ingress -n flixstore
