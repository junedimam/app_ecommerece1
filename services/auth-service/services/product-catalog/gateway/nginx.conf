server {
    listen 80;

    # 1. Route API Auth traffic
    location /api/auth {
        proxy_pass http://auth-service:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. Route API Product Catalog traffic
    location /api/products {
        proxy_pass http://product-catalog:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. Route everything else to the Frontend Storefront
    location / {
        proxy_pass http://frontend-storefront:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
