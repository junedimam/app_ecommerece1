apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flixstore-ingress
  namespace: flixstore
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
    - host: ""
      http:
        paths:
          - path: /api/auth/(.*)
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 5001
          - path: /api/products/(.*)
            pathType: Prefix
            backend:
              service:
                name: product-catalog
                port:
                  number: 5002
          - path: /api/cart/(.*)
            pathType: Prefix
            backend:
              service:
                name: cart-service
                port:
                  number: 5003
          - path: /api/payments/(.*)
            pathType: Prefix
            backend:
              service:
                name: payment-service
                port:
                  number: 5005
          - path: /(.*)
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: flixstore
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: flixstore
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 158670532325.dkr.ecr.us-east-1.amazonaws.com/flixstore-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: ""
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"