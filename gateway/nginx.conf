server {
    listen 80;

    location /api/auth {
        proxy_pass http://auth-service:5001;
    }

    location /api/products {
        proxy_pass http://product-catalog:5002;
    }

    location /api/cart {
        proxy_pass http://cart-service:5003;
    }

    location /api/payments {
        proxy_pass http://payment-service:5005;
    }

    location / {
        proxy_pass http://frontend-storefront:3000;
    }
}